<!DOCTYPE html>
<html>
<head>
<title>Donor Registration</title>
<link rel="stylesheet" href="style.css">
<style>
    .split-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
    .full-width {
        grid-column: span 2;
    }
    @media (max-width: 450px) {
        .split-grid {
            grid-template-columns: 1fr;
        }
        .full-width {
            grid-column: span 1;
        }
    }
    .back-btn {
        margin-top: 15px;
        background: transparent;
        border: 1px solid var(--border);
    }
    .back-btn:hover {
        background: rgba(255,255,255,0.1);
        box-shadow: none;
    }
</style>
</head>

<body>

<div class="container" style="max-width: 500px;">
    <h2>🩸 Donor Registration</h2>
    <form id="registerForm" class="split-grid">
        <input type="text" id="name" placeholder="Full Name" class="full-width" required>
        <input type="email" id="email" placeholder="Email" class="full-width" required>
        <input type="tel" id="phone" placeholder="Phone (10 digits)" maxlength="10" required>
        <input type="text" id="blood_group" placeholder="Blood Group (e.g. A+)" required>
        <input type="text" id="district" placeholder="District" required>
        <input type="text" id="city" placeholder="City" required>
        <input type="text" id="area" placeholder="Area / Locality" required>
        <input type="text" id="health_status" placeholder="Health (Good/Fair)" required>
        
        <input type="date" id="last_donation_date" class="full-width" title="Last Donation Date">
        
        <select id="availability" class="full-width" required>
            <option value="" disabled selected hidden>-- Availability to Donate --</option>
            <option value="Yes">Yes - Available immediately</option>
            <option value="No">No - Not available right now</option>
        </select>

        <button type="submit" class="full-width">Register as Donor</button>
        <button type="button" class="full-width back-btn" onclick="window.location.href='menu.html'">Back to Dashboard</button>
    </form>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    fetch("http://localhost:5000/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name:               document.getElementById("name").value,
            email:              document.getElementById("email").value,
            phone:              document.getElementById("phone").value,
            blood_group:        document.getElementById("blood_group").value,
            district:           document.getElementById("district").value,
            city:               document.getElementById("city").value,
            area:               document.getElementById("area").value,
            health_status:      document.getElementById("health_status").value,
            last_donation_date: document.getElementById("last_donation_date").value,
            availability:       document.getElementById("availability").value
        })
    })
    .then(res=>res.text())
    .then(data=>{
        alert(data);
        if(data === "Donor Registered Successfully"){
            window.location.href = "menu.html";
        }
    })
    .catch(()=>alert("Server not running"));
});
</script>

</body>
</html>
