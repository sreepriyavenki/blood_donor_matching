<!DOCTYPE html>
<html>
<head>
<title>Authentication</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIGNUP -->
<div id="signupForm" class="container">

<h2>Sign Up</h2>

<input type="email" id="s_email" placeholder="Email"><br>
<input type="password" id="s_password" placeholder="Password"><br>
<input type="password" id="s_confirm" placeholder="Confirm Password"><br>

<button onclick="signup()">Sign Up</button>

<p class="toggle-text">
Already have an account? 
<a onclick="showLogin()">Login</a>
</p>

</div>

<!-- LOGIN -->
<div id="loginForm" class="container" style="display:none;">

<h2>Login</h2>

<input type="email" id="l_email" placeholder="Email"><br>
<input type="password" id="l_password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p class="toggle-text">
Don't have an account? 
<a onclick="showSignup()">Sign Up</a>
</p>

</div>

<script>

function showLogin(){
document.getElementById("signupForm").style.display="none";
document.getElementById("loginForm").style.display="block";
}

function showSignup(){
document.getElementById("loginForm").style.display="none";
document.getElementById("signupForm").style.display="block";
}

function signup(){

const email=document.getElementById("s_email").value;
const password=document.getElementById("s_password").value;
const confirm=document.getElementById("s_confirm").value;

if(password!==confirm){
alert("Passwords do not match");
return;
}

fetch("http://localhost:5000/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email,
password:password
})
})
.then(res=>res.text())
.then(data=>{
alert(data);

/* After signup open menu page */
window.location.href="menu.html";

})
.catch(()=>{
alert("Server not running");
});

}

function login(){

const email=document.getElementById("l_email").value;
const password=document.getElementById("l_password").value;

fetch("http://localhost:5000/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email,
password:password
})
})
.then(res=>res.text())
.then(data=>{
alert(data);

if(data==="Login Successful"){
window.location.href="menu.html";
}

})
.catch(()=>{
alert("Server not running");
});

}

</script>

</body>
</html>
