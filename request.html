<!DOCTYPE html>
<html>
<head>
<title>Global Blood Request</title>
<link rel="stylesheet" href="style.css">
<style>
    .split-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
    .full-width {
        grid-column: span 2;
    }
    @media (max-width: 450px) {
        .split-grid { grid-template-columns: 1fr; }
        .full-width { grid-column: span 1; }
    }
</style>
</head>

<body>

<div class="container" style="max-width: 500px;">
    <h2>🚨 Global Blood Request</h2>
    <p style="margin-top:-15px; margin-bottom:20px; font-size:0.9rem;">
        Submit a global request. We will immediately text all matching donors in the district.
    </p>

    <form id="requestForm" class="split-grid">
        <input type="text" id="patient" placeholder="Patient Name" class="full-width" required>
        <input type="text" id="blood" placeholder="Blood Group Needed (e.g. O-)" required>
        <input type="text" id="district" placeholder="District" required>
        <input type="text" id="city" placeholder="City" required>
        <input type="text" id="contact" placeholder="Contact Number" required>
        <input type="text" id="hospital" placeholder="Hospital Name" class="full-width" required>

        <button type="submit" class="full-width" style="margin-top:10px;">Broadcast Request & SMS Donors</button>
        <button type="button" class="full-width" style="background:transparent; border:1px solid var(--border);" onclick="window.location.href='menu.html'">Back to Dashboard</button>
    </form>
</div>

<script>
document.getElementById("requestForm").addEventListener("submit",function(e){
    e.preventDefault();

    const btn = e.target.querySelector('button[type="submit"]');
    btn.innerText = "Sending...";
    btn.disabled = true;

    fetch("http://localhost:5000/request",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            patient_name: document.getElementById("patient").value,
            blood_group:  document.getElementById("blood").value,
            district:     document.getElementById("district").value,
            city:         document.getElementById("city").value,
            hospital:     document.getElementById("hospital").value,
            contact:      document.getElementById("contact").value
        })
    })
    .then(res=>res.text())
    .then(data=>{
        alert(data);
        btn.innerText = "Broadcast Request & SMS Donors";
        btn.disabled = false;
        e.target.reset();
    })
    .catch(()=>{
        alert("Server Error");
        btn.innerText = "Broadcast Request & SMS Donors";
        btn.disabled = false;
    });
});
</script>

</body>
</html>
