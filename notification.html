<!DOCTYPE html>
<html>
<head>
<title>Blood Request Notifications</title>
<link rel="stylesheet" href="style.css">
<style>
    .flex-inputs {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
    }
    @media (max-width: 450px) {
        .flex-inputs { flex-direction: column; gap: 0; }
    }
</style>
</head>

<body>

<div class="container container-wide">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="margin:0;">🔔 Incoming Requests</h2>
        <a href="menu.html" style="font-size:0.9rem; background:rgba(255,255,255,0.1); padding:8px 16px; border-radius:8px;">Back</a>
    </div>

    <div class="flex-inputs">
        <input type="text" id="district" placeholder="Enter Your District" style="margin-bottom: 0;">
        <button onclick="load()" style="max-width: 200px; margin-bottom: 0;">Check Local Requests</button>
    </div>

    <div style="overflow-x: auto; width: 100%;">
        <table id="table"></table>
    </div>
</div>

<script>
function load() {
    const district = document.getElementById("district").value;
    if(!district) {
        alert("Please enter a district.");
        return;
    }

    fetch("http://localhost:5000/notifications",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({district:district})
    })
    .then(res=>res.json())
    .then(data=>{
        let html="<tr><th>Patient</th><th>Blood</th><th>Hospital</th><th>Action</th></tr>";

        if(data.length === 0) {
            html += "<tr><td colspan='4' style='text-align:center;'>No pending requests in your district.</td></tr>";
        } else {
            data.forEach(r=>{
                html+=`
                <tr>
                <td>${r.patient_name}</td>
                <td><strong style="color:var(--primary);">${r.blood_group}</strong></td>
                <td>${r.hospital}</td>
                <td><button onclick="accept(${r.id})">Accept Request</button></td>
                </tr>
                `;
            });
        }
        document.getElementById("table").innerHTML=html;
    })
    .catch(()=>alert("Server error"));
}

function accept(id){
    if(confirm("Are you sure you want to accept this request and commit to donating blood?")) {
        fetch("http://localhost:5000/accept",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({id:id})
        })
        .then(res=>res.text())
        .then(data=>{
            alert(data);
            load(); // Reload table
        })
        .catch(()=>alert("Server error processing request."));
    }
}
</script>

</body>
</html>
