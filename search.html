<!DOCTYPE html>
<html>
<head>
<title>Search Donor</title>
<link rel="stylesheet" href="style.css">
<style>
    .flex-inputs {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
    }
    @media (max-width: 450px) {
        .flex-inputs { flex-direction: column; gap: 0; }
    }
</style>
</head>

<body>

<div class="container container-wide">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="margin:0;">🔍 Search Blood Donors</h2>
        <a href="menu.html" style="font-size:0.9rem; background:rgba(255,255,255,0.1); padding:8px 16px; border-radius:8px;">Back</a>
    </div>

    <div class="flex-inputs">
        <input type="text" id="blood" placeholder="Blood Group (e.g. O+)">
        <input type="text" id="district" placeholder="District">
    </div>

    <button onclick="search()" style="max-width: 200px;">Search</button>

    <div style="overflow-x: auto; width: 100%;">
        <table id="result"></table>
    </div>
</div>

<script>
function search(){
    const blood=document.getElementById("blood").value;
    const district=document.getElementById("district").value;

    if(!blood || !district) {
        alert("Please enter both Blood Group and District");
        return;
    }

    fetch("http://localhost:5000/search",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ blood_group:blood, district:district })
    })
    .then(res=>res.json())
    .then(data=>{
        let table="<tr><th>Name</th><th>Blood</th><th>City</th><th>Action</th></tr>";

        if(data.length === 0) {
            table += "<tr><td colspan='4' style='text-align:center;'>No active donors found in this district.</td></tr>";
        } else {
            data.forEach(d=>{
            table+=`<tr>
                <td>${d.name}</td>
                <td><strong style="color:var(--primary);">${d.blood_group}</strong></td>
                <td>${d.city}</td>
                <td><button onclick="requestDirect('${d.phone}')">Direct Request 💬</button></td>
                </tr>`;
            });
        }
        document.getElementById("result").innerHTML=table;
    })
    .catch(()=>alert("Server error"));
}

function requestDirect(donorPhone) {
    if (!donorPhone || donorPhone === "undefined") {
        alert("This donor has not provided a valid phone number.");
        return;
    }

    const userName = prompt("📝 Enter your Name (Patient/Relative):");
    if (!userName) return;

    const userContact = prompt("📱 Enter your Contact Number:");
    if (!userContact) return;

    const hospital = prompt("🏥 Enter Hospital Name & City:");
    if (!hospital) return;

    fetch("http://localhost:5000/request_direct", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            donorPhone: donorPhone,
            userName: userName,
            userContact: userContact,
            hospital: hospital
        })
    })
    .then(res => res.text())
    .then(data => alert(data))
    .catch(() => alert("Error connecting to server."));
}
</script>

</body>
</html>
